services:
  - type: web
    name: behnam-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: behnam-db
          property: connectionString

databases:
  - name: behnam-db
    plan: free
